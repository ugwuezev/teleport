# Least-privilege Role + RoleBinding for the Nginx deployer, scoped to one namespace.
# __NAMESPACE__ / __GROUP__ are substituted by onboard-user.sh.
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: nginx-deployer
  namespace: __NAMESPACE__
rules:
  - apiGroups: ["apps"]
    resources: ["deployments", "replicasets"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
  - apiGroups: [""]
    resources: ["pods", "services", "configmaps"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
  - apiGroups: [""]
    resources: ["pods/log", "events"]
    verbs: ["get", "list", "watch"]
  - apiGroups: ["cert-manager.io"]
    resources: ["certificates"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
  - apiGroups: [""]
    resources: ["secrets"]
    verbs: ["get", "list", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: nginx-deployer-binding
  namespace: __NAMESPACE__
subjects:
  # Bind to the group from the client cert's O field.
  - apiGroup: rbac.authorization.k8s.io
    kind: Group
    name: __GROUP__
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: nginx-deployer
