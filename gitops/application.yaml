# Argo CD Application: syncs the nginx/ kustomize folder from Git, with prune + self-heal.
# __REPO_URL__ / __REPO_REVISION__ are filled in by install-argocd.sh.
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: nginx-app
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  source:
    repoURL: __REPO_URL__
    targetRevision: __REPO_REVISION__
    path: nginx
  destination:
    server: https://kubernetes.default.svc
    namespace: nginx-app
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
