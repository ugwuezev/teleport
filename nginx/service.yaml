# Expose Nginx over HTTPS via NodePort (portable, no LoadBalancer/Ingress).
apiVersion: v1
kind: Service
metadata:
  name: nginx
  namespace: nginx-app
  labels:
    app: nginx
spec:
  type: NodePort
  selector:
    app: nginx
  ports:
    - name: https
      port: 443
      targetPort: 8443
      nodePort: 30443    # https://<node-ip>:30443
